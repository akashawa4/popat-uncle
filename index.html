<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Continue with Google</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    /* Animated background orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .bg-orb:nth-child(1) {
      width: 400px; height: 400px;
      background: #7c3aed;
      top: -100px; left: -100px;
      animation-duration: 10s;
    }
    .bg-orb:nth-child(2) {
      width: 350px; height: 350px;
      background: #2563eb;
      bottom: -80px; right: -80px;
      animation-duration: 12s;
      animation-delay: -3s;
    }
    .bg-orb:nth-child(3) {
      width: 250px; height: 250px;
      background: #f59e0b;
      top: 50%; left: 60%;
      animation-duration: 9s;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Login card */
    .login-card {
      position: relative;
      width: 420px;
      padding: 48px 40px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.4);
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 1;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px; height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
    }

    .logo-area h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .logo-area p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* Google button */
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 14px;
      background: #fff;
      color: #1f1f1f;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.25);
    }

    .google-btn:active {
      transform: translateY(0);
    }

    .google-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.12);
    }

    .divider span {
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .terms {
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .terms a {
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
    }
    .terms a:hover { text-decoration: underline; }

    /* Loading spinner */
    .google-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid #e5e7eb;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .google-btn.loading .spinner { display: block; }
    .google-btn.loading .btn-text { display: none; }
    .google-btn.loading .g-icon { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Logged in state */
    .user-card {
      display: none;
      text-align: center;
      animation: cardIn 0.5s ease;
    }

    .user-card.show { display: block; }
    .login-content.hide { display: none; }

    .user-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      margin: 0 auto 16px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      object-fit: cover;
    }

    .user-card h2 {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .user-card .user-email {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .user-card .greeting-text {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      margin-bottom: 24px;
    }

    @keyframes shimmer { to { background-position: 200% center; } }

    .signout-btn {
      padding: 10px 28px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .signout-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* Error toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #ef4444;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>

  <div class="login-card">
    <!-- Login view -->
    <div class="login-content" id="loginContent">
      <div class="logo-area">
        <div class="logo-icon">🔐</div>
        <h1>Welcome</h1>
        <p>Sign in to continue</p>
      </div>

      <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
        <svg class="g-icon" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span class="btn-text">Continue with Google</span>
        <div class="spinner"></div>
      </button>

      <div class="divider"><span>secured by firebase</span></div>

      <p class="terms">
        By continuing, you agree to our
        <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </p>
    </div>

    <!-- Logged-in view -->
    <div class="user-card" id="userCard">
      <img class="user-avatar" id="userAvatar" src="" alt="avatar">
      <h2 id="userName"></h2>
      <p class="user-email" id="userEmail"></p>
      <p class="greeting-text">Hi Popat Uncle! 👋</p>
      <button class="signout-btn" onclick="signOutUser()">Sign Out</button>
    </div>
  </div>

  <!-- Error toast -->
  <div class="toast" id="toast"></div>

  <!-- Firebase SDKs (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    // Firebase config (matches your firebas.ts)
    const firebaseConfig = {
      apiKey: "AIzaSyARJeJ2wRTiYpbWPQsIsK08xRYxuWnf27U",
      authDomain: "test-1ffe5.firebaseapp.com",
      projectId: "test-1ffe5",
      storageBucket: "test-1ffe5.firebasestorage.app",
      messagingSenderId: "134003180054",
      appId: "1:134003180054:web:f2c51d6aca0c4e5260ab37",
      measurementId: "G-XYB6M8XKGH"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // DOM elements
    const loginContent = document.getElementById('loginContent');
    const userCard = document.getElementById('userCard');
    const googleBtn = document.getElementById('googleBtn');
    const toast = document.getElementById('toast');

    // Sign in with Google
    function signInWithGoogle() {
      googleBtn.classList.add('loading');

      auth.signInWithPopup(provider)
        .then((result) => {
          // Auth state listener handles UI update
        })
        .catch((error) => {
          googleBtn.classList.remove('loading');
          showToast(error.message);
        });
    }

    // Sign out
    function signOutUser() {
      auth.signOut();
    }

    // Listen for auth state changes
    auth.onAuthStateChanged((user) => {
      googleBtn.classList.remove('loading');

      if (user) {
        // Show user card
        document.getElementById('userAvatar').src = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || 'U') + '&background=7c3aed&color=fff';
        document.getElementById('userName').textContent = user.displayName || 'User';
        document.getElementById('userEmail').textContent = user.email;

        loginContent.classList.add('hide');
        userCard.classList.add('show');
      } else {
        // Show login
        loginContent.classList.remove('hide');
        userCard.classList.remove('show');
      }
    });

    // Toast helper
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }
  </script>
</body>
</html>
